<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover"
    />
    <title>Modern Chatroom</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body class="light-mode">
    <button class="theme-toggle" onclick="toggleTheme()">
      <i class="fas fa-moon"></i>
    </button>

    <div class="auth-container" id="authContainer">
      <div class="auth-box">
        <h1><i class="fas fa-comments"></i> Chatroom</h1>

        <div class="auth-tabs">
          <button class="auth-tab active" onclick="switchTab('login')">
            Login
          </button>
          <button class="auth-tab" onclick="switchTab('register')">
            Register
          </button>
        </div>

        <form id="loginForm" class="auth-form active">
          <input
            type="text"
            id="loginUsername"
            placeholder="Benutzername"
            required
          />
          <input
            type="password"
            id="loginPassword"
            placeholder="Passwort"
            required
          />
          <button type="submit">
            <i class="fas fa-sign-in-alt"></i> Login
          </button>
        </form>

        <form id="registerForm" class="auth-form">
          <input
            type="text"
            id="registerUsername"
            placeholder="Benutzername"
            required
          />
          <input
            type="password"
            id="registerPassword"
            placeholder="Passwort"
            required
          />
          <input
            type="password"
            id="confirmPassword"
            placeholder="Passwort bestätigen"
            required
          />
          <button type="submit">
            <i class="fas fa-user-plus"></i> Registrieren
          </button>
        </form>
      </div>
    </div>

    <div class="chat-container" id="chatContainer" style="display: none">
      <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
        <i class="fas fa-bars"></i>
      </button>

      <div class="sidebar">
        <div class="user-profile">
          <div class="profile-img-container">
            <img
              id="profileImage"
              src="/default-avatar.png"
              alt="Profil"
              class="profile-img"
            />
            <div
              class="profile-img-overlay"
              onclick="document.getElementById('profileUpload').click()"
            >
              <i class="fas fa-camera"></i>
            </div>
            <input
              type="file"
              id="profileUpload"
              accept="image/*"
              style="display: none"
            />
          </div>
          <h3 id="usernameDisplay"></h3>
          <button id="logoutBtn" class="logout-btn">
            <i class="fas fa-sign-out-alt"></i> Logout
          </button>
        </div>

        <div class="online-users">
          <h4>
            <i class="fas fa-users"></i> Online (<span id="onlineCount">0</span
            >)
          </h4>
          <div id="usersList" class="users-list"></div>
        </div>
      </div>

      <div class="chat-main">
        <div class="chat-header">
          <h3><i class="fas fa-comment-dots"></i> Chat</h3>
          <div id="typingIndicator" class="typing-indicator"></div>
        </div>

        <div class="messages" id="messages"></div>

        <div class="input-area">
          <div id="imagePreview" class="image-preview" style="display: none">
            <img id="previewImg" src="" />
            <button id="removeImage" class="remove-preview">×</button>
          </div>

          <div class="message-input">
            <div class="attach-wrapper">
              <button
                class="attach-btn"
                onclick="toggleAttachMenu()"
                type="button"
              >
                <i class="fas fa-paperclip"></i>
              </button>
              <div class="attach-menu" id="attachMenu">
                <button
                  onclick="document.getElementById('imageUpload').click()"
                  type="button"
                >
                  <i class="fas fa-image"></i> Bild
                </button>
                <button
                  onclick="document.getElementById('videoUpload').click()"
                  type="button"
                >
                  <i class="fas fa-video"></i> Video
                </button>
              </div>
            </div>

            <input
              type="file"
              id="imageUpload"
              accept="image/*"
              style="display: none"
            />
            <input
              type="file"
              id="videoUpload"
              accept="video/*"
              style="display: none"
            />

            <textarea
              id="messageInput"
              placeholder="Nachricht schreiben..."
              rows="1"
            ></textarea>

            <button id="sendBtn" class="send-btn" type="button">
              <i class="fas fa-paper-plane"></i>
            </button>
          </div>
        </div>
      </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="toast.js"></script>
    <script src="auth.js"></script>
    <script src="chat.js"></script>
  </body>
</html>
